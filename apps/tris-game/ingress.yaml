apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: default
  annotations:
    # Triggers cert-manager to request a certificate from Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Forces Traefik to automatically redirect HTTP requests to HTTPS
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  # Defines the HTTPS setup and specifies where to store the generated certificate
  tls:
  - hosts:
    - tris.lorenzodortona.com
    secretName: tris-tls-secret
  rules:
  - host: tris.lorenzodortona.com
    http:
      paths:
      # Routes backend API requests to the Go service
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      # Routes all other traffic to the React frontend service
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80