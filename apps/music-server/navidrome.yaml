apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: music-server
spec:
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      containers:
      - name: navidrome
        image: deluan/navidrome:latest
        ports:
        - containerPort: 4533
        env:
        - name: ND_MUSICFOLDER
          value: "/music"
        - name: ND_DATAFOLDER
          value: "/data"
        volumeMounts:
        - name: music-data
          mountPath: /music
        - name: navidrome-data
          mountPath: /data
      volumes:
      - name: music-data
        persistentVolumeClaim:
          claimName: music-pvc
      - name: navidrome-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome-service
  namespace: music-server
spec:
  selector:
    app: navidrome
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4533
