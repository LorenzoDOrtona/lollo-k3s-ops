apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: music-ingress
  namespace: music-server
spec:
  ingressClassName: tailscale
  tls:
  - host:
    - navidrome
    - spotdl 
  rules:
  - host: navidrome
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: navidrome-service
            port:
              number: 80
  - host: spotdl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spotdl-service
            port:
              number: 80
