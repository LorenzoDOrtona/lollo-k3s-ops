apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  targetNamespace: tailscale
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: ">= 1.0.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale-repo
        namespace: flux-system
  install:
    createNamespace: true
  valuesFrom:
    - kind: Secret
      name: tailscale-oauth-values
