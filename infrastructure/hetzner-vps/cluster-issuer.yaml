# k3s/cluster-issuer.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # The ACME server URL for Let's Encrypt production environment
    server: https://acme-v02.api.letsencrypt.org/directory
    # Dummy email used for Let's Encrypt registration
    email: contact@lorenzodortona.com
    # Secret where the ACME account private key will be stored
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    # Configure the HTTP-01 challenge to prove domain ownership
    solvers:
    - http01:
        ingress:
          class: traefik