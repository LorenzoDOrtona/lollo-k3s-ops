apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: music-server
  namespace: flux-system
spec:
  targetNamespace: music-server
  interval: 5m
  path: ./apps/music-server
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
